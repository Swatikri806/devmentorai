version: '3.8'

services:
  backend:
    build:
      context: ./devmentorai-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - devmentorai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/profile"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./devmentorai-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    networks:
      - devmentorai-network
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api

networks:
  devmentorai-network:
    driver: bridge
